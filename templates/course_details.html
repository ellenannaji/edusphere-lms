<!DOCTYPE html>
<html>

<head>

    <title>{{ course[1] }}</title>

    <link rel="stylesheet" href="/static/style.css">

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        .card {
            background: #f5f5f5;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
        }

        .quiz-btn {
            display: inline-block;
            padding: 10px 15px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 10px;
        }

        .quiz-btn:hover {
            background: #45a049;
        }

        iframe {
            border-radius: 10px;
        }
    </style>

</head>

<body>

<h1>{{ course[1] }} 🎓</h1>

<p>{{ course[2] }}</p>

<h3>Instructor: {{ course[3] }}</h3>

<hr>

<!-- QUIZ BUTTON (IMPORTANT FOR LMS) -->
<a class="quiz-btn" href="/quiz/{{ course[0] }}">
    Start Quiz 📝
</a>

<hr>

<h2>Video Lessons 🎥</h2>

{% for video in videos %}

<div class="card">

    <h3>{{ video[2] }}</h3>

    <iframe
        width="560"
        height="315"
        src="{{ video[3] }}"
        frameborder="0"
        allowfullscreen>
    </iframe>

</div>

{% endfor %}

</body>

</html>
